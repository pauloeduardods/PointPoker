services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pointpoker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pointpoker}
      POSTGRES_DB: ${DB_NAME:-pointpoker}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pointpoker}"]
      interval: 5s
      timeout: 5s
      retries: 5

